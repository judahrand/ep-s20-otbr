<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thread Border Router - Network</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/favicon.ico">
</head>

<body>
    <nav class="nav" id="nav"></nav>
    <div class="container">
        <h1 class="page-title">Network Management</h1>
        <p class="page-desc">Discover network information</p>
        <!-- Hostname -->
        <div class="card section">
            <div class="card-header">Hostname</div>
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px">
                Set the mDNS hostname for this device. The new hostname is applied immediately and persisted across
                reboots.
            </p>
            <div class="flex-between" style="gap:10px;flex-wrap:wrap">
                <input class="form-input" type="text" id="hostnameInput" placeholder="ep-s20-otbr"
                    style="max-width:320px;flex:1" maxlength="63">
                <div style="display:flex;align-items:center;gap:10px">
                    <button class="btn btn-primary btn-sm" id="hostnameSaveBtn" onclick="saveHostname()">Save</button>
                    <span id="hostnameStatus" style="font-size:13px"></span>
                </div>
            </div>
        </div>
        <!-- Network Addresses -->
        <div class="card section">
            <div class="flex-between mb-16">
                <div class="card-header" style="border:none;margin:0;padding:0">Network Addresses</div>
                <button class="btn btn-primary btn-sm" id="ethRefreshBtn"
                    onclick="loadEthernetAddresses()">Refresh</button>
            </div>
            <div id="ethAddrList">
                <p class="text-muted" style="font-size:13px">Loading...</p>
            </div>
        </div>

    </div>
    <div class="footer">Copyright &copy; 2026 Espressif Systems. All rights reserved.</div>

    <script src="/static/api.js"></script>
    <script>
        function renderEthernetAddresses(data) {
            var result = (data && data.result) ? data.result : {};
            var mac = result.mac || '';
            var list = result.addresses || [];
            var el = document.getElementById('ethAddrList');
            var html = '';
            if (mac) {
                html += '<div class="info-row"><span class="info-label">MAC Address:</span><span class="info-value mono">' + escapeHtml(mac) + '</span></div>';
            }
            if (!list.length) {
                html += '<p class="text-muted" style="font-size:13px">No addresses</p>';
                el.innerHTML = html;
                return;
            }
            html += '<div class="table-wrap"><table><thead><tr><th>Address</th><th>Type</th><th>Details</th></tr></thead><tbody>';
            for (var i = 0; i < list.length; i++) {
                var a = list[i];
                var badge = a.type === 'ipv4' ? 'badge-info' : 'badge-success';
                var details = '';
                if (a.type === 'ipv4') {
                    details = 'Mask: ' + escapeHtml(a.netmask) + ' &nbsp; GW: ' + escapeHtml(a.gateway);
                } else if (a.origin === 'slaac') {
                    details = 'SLAAC';
                }
                html += '<tr><td style="font-family:\'Courier New\',Consolas,monospace;font-size:12px">' +
                    escapeHtml(a.address) +
                    '</td><td><span class="badge ' + badge + '">' + escapeHtml(a.type) + '</span></td>' +
                    '<td style="font-size:12px;color:var(--text-muted)">' + details + '</td></tr>';
            }
            html += '</tbody></table></div>';
            el.innerHTML = html;
        }

        function loadEthernetAddresses() {
            var btn = document.getElementById('ethRefreshBtn');
            if (btn) { btn.disabled = true; }
            apiGet('/ethernet/ipaddr').then(function (data) {
                renderEthernetAddresses(data);
            }).catch(function () {
                document.getElementById('ethAddrList').innerHTML =
                    '<p class="text-muted" style="font-size:13px">Failed to load</p>';
            }).then(function () {
                if (btn) { btn.disabled = false; }
            });
        }

        renderEthernetAddresses(getCached('/ethernet/ipaddr'));
        loadEthernetAddresses();

        function loadHostname() {
            apiGet('/config').then(function (data) {
                var h = (data && data.result && data.result.hostname) ? data.result.hostname : '';
                if (h) {
                    document.getElementById('hostnameInput').value = h;
                }
            }).catch(function () { /* ignore — leave placeholder */ });
        }

        function saveHostname() {
            var input = document.getElementById('hostnameInput');
            var status = document.getElementById('hostnameStatus');
            var btn = document.getElementById('hostnameSaveBtn');
            var val = input.value.trim();
            if (!val) {
                status.textContent = 'Hostname cannot be empty';
                status.style.color = 'var(--danger)';
                return;
            }
            btn.disabled = true;
            status.textContent = 'Saving...';
            status.style.color = 'var(--text-muted)';
            apiPut('/config', { hostname: val }).then(function () {
                status.textContent = 'Saved';
                status.style.color = 'var(--success)';
            }).catch(function () {
                status.textContent = 'Failed to save';
                status.style.color = 'var(--danger)';
            }).then(function () {
                btn.disabled = false;
            });
        }

        loadHostname();
    </script>
</body>

</html>
